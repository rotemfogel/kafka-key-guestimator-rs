services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  →  OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger
      - prometheus
      - loki

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.6.11
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.6.11
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail.yaml:/etc/promtail/config.yaml:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.6.16
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger

volumes:
  loki-data:
